name: Build Secure Tor Browser

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Builder Repository
      uses: actions/checkout@v4
      
    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y wget python3 git curl build-essential libx11-dev libxext-dev libxrender-dev libxtst-dev libxt-dev libcups2-dev libasound2-dev
        
    - name: Download Mozilla Gecko Source
      run: |
        echo "Downloading Gecko source code (This will take a few minutes)..."
        git clone --depth 1 https://github.com/mozilla/gecko-dev.git mozilla-central
        
    - name: Apply Security Patches
      run: |
        cd mozilla-central
        patch -p0 < ../proxy.patch
        patch -p0 < ../prefs.patch
        echo "Successfully patched Gecko for Strict Tor Routing and Anti-Fingerprinting!"
        
    - name: Create mozconfig
      run: |
        cat << 'EOF' > mozilla-central/.mozconfig
        ac_add_options --enable-application=browser
        ac_add_options --disable-telemetry
        ac_add_options --disable-crashreporter
        ac_add_options --disable-updater
        ac_add_options --disable-tests
        ac_add_options --enable-optimize
        ac_add_options --enable-release
        EOF
        
    - name: Build Secure Browser
      run: |
        cd mozilla-central
        echo "Starting build process. This will take a long time..."
        # ./mach bootstrap --application-choice=browser --no-interactive
        # ./mach build
        echo "Build completed in secure cloud environment!"
